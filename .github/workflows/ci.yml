name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm turbo run typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Circular dependency check
        run: pnpm check:circular

      - name: Build
        run: pnpm turbo run build

      - name: Tests with coverage
        run: pnpm turbo run test:coverage

      - name: Bundle size check
        run: pnpm size:ci

      - name: Generate example spec
        run: pnpm --filter @swagger-connect-examples/plain-typescript generate

      - name: Validate example spec
        run: pnpm --filter @swagger-connect-examples/plain-typescript validate
